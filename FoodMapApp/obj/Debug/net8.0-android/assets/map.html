<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        #map {
            height: 100vh;
            width: 100%;
        }
    </style>

</head>

<body>

    <div id="map"></div>

    <script>

        var map = L.map('map').setView([10.767174, 106.693120], 18);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(map);

        L.marker([10.767174, 106.693120])
            .addTo(map)
            .bindPopup("Ph? B¨i Vi?n - Qu?n 1")
            .openPopup();

    </script>

</body>
</html>
