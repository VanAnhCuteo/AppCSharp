<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tour Map</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    
    <!-- Shared CSS -->
    <link rel="stylesheet" href="base.css" />
    <link rel="stylesheet" href="markers.css" />
    <link rel="stylesheet" href="sheet.css" />
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Outfit', sans-serif; overflow: hidden; background: #fdfcfd; }
        #map { height: 100vh; width: 100vw; background: #f8f9fa; }
        
        /* --- Leaflet Control Overrides --- */
        .leaflet-control-zoom a {
            color: white !important;
            background-color: #F82B60 !important;
            border: none !important;
            border-radius: 8px !important;
            margin-bottom: 8px !important;
            box-shadow: 0 4px 12px rgba(248, 43, 96, 0.2) !important;
            width: 36px !important;
            height: 36px !important;
            line-height: 36px !important;
            font-weight: 600 !important;
            transition: all 0.2s ease;
            display: flex !important;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .leaflet-control-zoom a:hover {
            background-color: #ff608c !important;
            transform: scale(1.05);
        }

        .leaflet-control-zoom {
            border: none !important;
            margin-right: 15px !important;
            margin-bottom: 25px !important;
        }

        /* Locate Button */
        #locate-btn {
            position: absolute;
            bottom: 125px;
            right: 15px;
            width: 44px;
            height: 44px;
            background: #FFFFFF;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            cursor: pointer;
            color: #F82B60;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #locate-btn:hover {
            background: #fdfdfd;
            transform: scale(1.1);
        }

        #locate-btn svg {
            width: 20px;
            height: 20px;
        }

        /* User Location Marker override */
        .user-marker {
            background: #4285F4;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 0 5px rgba(66, 133, 244, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0px rgba(66, 133, 244, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(66, 133, 244, 0); }
            100% { box-shadow: 0 0 0 0px rgba(66, 133, 244, 0); }
        }

        /* Numbered markers override */
        .tour-marker {
            background: #333;
            color: white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            font-size: 14px;
            transition: all 0.3s;
        }
        .tour-marker.active {
            background: #F82B60;
            transform: scale(1.2);
            z-index: 1000 !important;
            box-shadow: 0 4px 15px rgba(248, 43, 96, 0.4);
        }

        /* Speaker Pulse Effect */
        .speaker-btn.playing {
            animation: speaker-pulse 1.2s infinite ease-in-out;
            background: #F82B60 !important;
            color: white !important;
            border-color: #F82B60 !important;
        }

        @keyframes speaker-pulse {
            0% { box-shadow: 0 0 0 0 rgba(248, 43, 96, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 0 12px rgba(248, 43, 96, 0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(248, 43, 96, 0); transform: scale(1); }
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <!-- Center Button -->
    <button id="locate-btn" onclick="centerOnUser()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="3 11 22 2 13 21 11 13 3 11"></polygon>
        </svg>
    </button>

    <!-- Bottom Sheet Details -->
    <div id="bottom-sheet" class="bottom-sheet">
        <div class="sheet-drag-handle" id="drag-handle">
            <div class="drag-bar"></div>
        </div>
        <div class="sheet-content">
            <div id="sheet-header">
                <div style="flex: 1; min-width: 0;">
                    <h2 id="sheet-title">Tên quán</h2>
                    <div class="lang-selector-modern" onclick="openLanguagePicker()">
                        <div class="current-lang-btn">
                            <span id="current-lang-name">Tiếng Việt</span>
                            <svg class="chevron-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>
                    </div>
                </div>
                <button id="sheet-speaker-btn" class="speaker-btn" onclick="playCurrentTourPoiAudio()">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.03,19.86 21,16.28 21,12C21,7.72 18.03,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16.02C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z"/>
                    </svg>
                </button>
            </div>

            <!-- Image Gallery -->
            <div class="sheet-images" id="sheet-images"></div>

            <!-- Info Section -->
            <div class="sheet-info">
                <div class="info-row">
                    <svg class="info-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                    <span id="sheet-address"></span>
                </div>
                <div class="info-row">
                    <svg class="info-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span id="sheet-time"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Language Picker Overlay -->
    <div id="lang-picker-overlay" class="lang-picker-overlay hidden">
        <div class="lang-picker-container">
            <div class="lang-picker-header">
                <h3>Chọn ngôn ngữ</h3>
                <button onclick="closeLanguagePicker()">Xong</button>
            </div>
            <div id="lang-picker-list" class="lang-picker-list">
                <!-- Dynamic Content -->
            </div>
        </div>
    </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([10.7672, 106.6931], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        let tourPois = [];
        let markers = [];
        let userMarker = null; // Store user marker reference
        let routeLayer = null;
        let previewLayer = null;
        let lastUserLat = null;
        let lastUserLng = null;
        let selectedLanguage = 'vi';
        let currentPoiDescription = null;
        let currentBasePoiId = null;
        let platformApiBase = "https://foodmapappapi.azurewebsites.net/api/Pois";

        // Bottom Sheet Logic
        const sheet = document.getElementById('bottom-sheet');
        const dragHandle = document.getElementById('drag-handle');
        let startY = 0;
        let isDragging = false;

        if (dragHandle) {
            dragHandle.addEventListener('touchstart', (e) => {
                startY = e.touches[0].clientY;
                isDragging = true;
                sheet.style.transition = 'none';
            }, { passive: true });

            document.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                const deltaY = e.touches[0].clientY - startY;
                if (deltaY > 0) {
                    sheet.style.transform = `translateY(calc(-80vh + ${deltaY}px))`;
                }
            }, { passive: true });

            document.addEventListener('touchend', (e) => {
                if (!isDragging) return;
                isDragging = false;
                sheet.style.transition = 'transform 0.3s ease-out';
                const deltaY = e.changedTouches[0].clientY - startY;

                if (deltaY > 100) {
                    closeDetails();
                } else {
                    sheet.style.transform = 'translateY(-80vh)';
                }
            });
        }

        // --- Helper: Distance ---
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // metres
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; // in metres
        }

        window.loadTourRoute = async function(json, userLat, userLng, currentStopIndex, isJourneyStarted) {
            console.log("Tour update:", userLat, userLng, "Stop:", currentStopIndex, "Started:", isJourneyStarted);
            tourPois = typeof json === 'string' ? JSON.parse(json) : json;
            lastUserLat = userLat;
            lastUserLng = userLng;

            // Clear existing layers
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            if (routeLayer) map.removeLayer(routeLayer);
            if (previewLayer) map.removeLayer(previewLayer);

            // 1. User Location
            if (userLat !== null && userLng !== null) {
                userMarker = L.marker([userLat, userLng], {
                    icon: L.divIcon({ className: 'user-marker', iconSize: [16, 16], iconAnchor: [8, 8] })
                }).addTo(map);
                markers.push(userMarker);

                // Proximity check for auto-opening details
                if (isJourneyStarted && currentStopIndex < tourPois.length) {
                    const target = tourPois[currentStopIndex];
                    const distance = calculateDistance(userLat, userLng, target.latitude, target.longitude);
                    if (distance < 50 && currentPoiIdOpen !== target.poi_id) {
                        openDetails(target);
                    }
                }
            }

            // 2. Markers Styling Logic
            tourPois.forEach((poi, index) => {
                let markerClass = 'tour-marker';
                if (isJourneyStarted) {
                    if (index === currentStopIndex) markerClass += ' active';
                }

                const marker = L.marker([poi.latitude, poi.longitude], {
                    icon: L.divIcon({
                        className: markerClass,
                        html: `<span>${index + 1}</span>`,
                        iconSize: [30, 30],
                        iconAnchor: [15, 15]
                    })
                }).addTo(map);
                
                marker.on('click', () => openDetails(poi));
                markers.push(marker);
            });

            // 3. Routing Logic
            if (isJourneyStarted) {
                // NAVIGATION MODE: User -> Target
                if (userLat === null) return;
                const distanceToTarget = calculateDistance(userLat, userLng, target.latitude, target.longitude);
                
                // If more than 10 meters, use OSRM. Otherwise, draw a direct dashed line to center of POI.
                if (distanceToTarget > 10) {
                    const waypoints = [`${userLng},${userLat}`, `${target.longitude},${target.latitude}`];
                    const url = `https://router.project-osrm.org/route/v1/walking/${waypoints.join(';')}?overview=full&geometries=geojson`;
                    
                    try {
                        const res = await fetch(url);
                        const data = await res.json();
                        if (data.code === 'Ok') {
                            const route = data.routes[0];
                            const mainRouteLayer = L.geoJSON(route.geometry, {
                                style: { color: '#F82B60', weight: 6, opacity: 0.8, lineJoin: 'round' }
                            });

                            // Dashed "off-road" line to the target's center
                            const coords = route.geometry.coordinates;
                            const lastPoint = coords[coords.length - 1];
                            const walkingLine = L.polyline([
                                [lastPoint[1], lastPoint[0]],
                                [target.latitude, target.longitude]
                            ], {
                                color: '#F82B60', weight: 4, opacity: 0.6, dashArray: '5, 10'
                            });

                            routeLayer = L.featureGroup([mainRouteLayer, walkingLine]).addTo(map);
                            
                            // Adjust bounds with min padding to keep both visible
                            const bounds = routeLayer.getBounds();
                            bounds.extend([userLat, userLng]);
                            map.fitBounds(bounds, { padding: [120, 120], maxZoom: 18 });
                        }
                    } catch (e) {
                        console.error("OSRM Error:", e);
                        // Fallback to direct line
                        routeLayer = L.polyline([[userLat, userLng], [target.latitude, target.longitude]], 
                            { color: '#F82B60', weight: 5, dashArray: '8, 12', opacity: 0.7 }).addTo(map);
                        map.fitBounds(routeLayer.getBounds(), { padding: [100, 100], maxZoom: 18 });
                    }
                } else {
                    // VERY CLOSE: Just a direct connecting line
                    routeLayer = L.polyline([[userLat, userLng], [target.latitude, target.longitude]], 
                        { color: '#F82B60', weight: 5, dashArray: '3, 6', opacity: 0.8 }).addTo(map);
                    
                    // Don't fit bounds too tight
                    map.setView([target.latitude, target.longitude], 18, { animate: true });
                }
            } else {
                // PREVIEW MODE: Polyline connecting all points
                const pathCoords = tourPois.map(p => [p.latitude, p.longitude]);
                previewLayer = L.polyline(pathCoords, {
                    color: '#999',
                    weight: 3,
                    dashArray: '8, 12',
                    opacity: 0.5
                }).addTo(map);
                
                if (pathCoords.length > 0) {
                    map.fitBounds(previewLayer.getBounds(), { padding: [80, 80] });
                }
            }
        };

        window.openDetails = async function(poi) {
            currentPoiIdOpen = poi.poi_id || poi.id;
            currentBasePoiId = poi.poi_id || poi.id; 
            currentPoiDescription = poi.description || "";
            document.getElementById('sheet-title').innerText = poi.name;
            document.getElementById('sheet-address').innerText = poi.address || "Đang cập nhật...";
            document.getElementById('sheet-time').innerText = poi.opening_hours || "08:00 - 22:00";
            
            const imgContainer = document.getElementById('sheet-images');
            imgContainer.innerHTML = '';
            
            // Image fallback and robust URL
            let imageUrl = poi.image_url || '';
            const img = document.createElement('img');
            img.className = 'sheet-image';
            
            if (imageUrl) {
                // Check if it's already a full URL
                if (imageUrl.startsWith('http')) {
                    img.src = imageUrl;
                } else {
                    // Try to construct assuming it's on the same backend
                    img.src = `https://foodmapappapi.azurewebsites.net/${imageUrl.startsWith('/') ? '' : '/'}${imageUrl}`;
                }
            } else {
                img.src = 'https://via.placeholder.com/300x200?text=FoodMap+Image';
            }
            
            img.onerror = () => { img.src = 'https://via.placeholder.com/300x200?text=Image+Load+Failed'; };
            imgContainer.appendChild(img);

            // Update speaker visibility based on description
            const speakerBtn = document.getElementById('sheet-speaker-btn');
            if (speakerBtn) {
                if (currentPoiDescription && currentPoiDescription.trim().length > 0) {
                    speakerBtn.classList.remove('hidden');
                } else {
                    speakerBtn.classList.add('hidden');
                }
            }

            // Audio logic: fetch languages to update UI
            try {
                const backendDomain = platformApiBase.split('/api')[0];
                const res = await fetch(`${backendDomain}/api/Language`);
                if (res.ok) {
                    const languages = await res.json();
                    const current = languages.find(l => l.language_code === selectedLanguage) || languages.find(l => l.language_code === 'vi') || languages[0];
                    if (current) {
                        document.getElementById('current-lang-name').innerText = current.name;
                        selectedLanguage = current.language_code;
                    }
                }
            } catch (e) { console.error("Error fetching languages", e); }

            sheet.classList.add('open');
            sheet.style.transform = 'translateY(-80vh)';
        };

        window.closeDetails = function() {
            sheet.classList.remove('open');
            sheet.style.transform = '';
            currentPoiIdOpen = null;
            currentBasePoiId = null;
        };

        window.playCurrentTourPoiAudio = function() {
            if (!currentPoiIdOpen) return;
            const speakerBtn = document.getElementById('sheet-speaker-btn');
            
            // Toggle visual state
            if (speakerBtn.classList.contains('playing')) {
                window.location.href = `app-tts://stop?id=${currentPoiIdOpen}`;
                speakerBtn.classList.remove('playing');
            } else {
                window.location.href = `app-tts://speak?id=${currentPoiIdOpen}&lang=${selectedLanguage}&manual=true`;
                speakerBtn.classList.add('playing');
            }
        };

        // Callbacks from C#
        window.onTtsFinished = function() {
            const speakerBtn = document.getElementById('sheet-speaker-btn');
            if (speakerBtn) speakerBtn.classList.remove('playing');
        };

        window.onTtsProgress = function(index, total) {
            // Can be used for progress bars if added later
        };

        window.stopAudioProfessional = function() {
            const speakerBtn = document.getElementById('sheet-speaker-btn');
            if (speakerBtn) speakerBtn.classList.remove('playing');
        };

        // --- Language Picker Logic (Mirrored from features.js) ---
        window.openLanguagePicker = async function() {
            const overlay = document.getElementById('lang-picker-overlay');
            const list = document.getElementById('lang-picker-list');
            if (!currentBasePoiId) return;

            overlay.classList.remove('hidden');
            list.innerHTML = '<div style="padding: 20px; text-align: center; color: #888;">Đang tải ngôn ngữ...</div>';

            try {
                const backendDomain = platformApiBase.split('/api')[0];
                const res = await fetch(`${backendDomain}/api/Language`);
                if (res.ok) {
                    const languages = await res.json();
                    list.innerHTML = '';
                    languages.forEach(lang => {
                        const isSelected = lang.language_code === selectedLanguage;
                        const item = document.createElement('div');
                        item.className = `lang-item ${isSelected ? 'selected' : ''}`;
                        item.innerHTML = `
                            <span class="lang-item-name">${lang.name}</span>
                            ${isSelected ? '<div class="lang-item-check"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>' : ''}
                        `;
                        item.onclick = () => setSelectedLang(lang.language_code, lang.name);
                        list.appendChild(item);
                    });
                }
            } catch (e) {
                list.innerHTML = '<div style="padding: 20px; color: #ff4d4f;">Không thể tải danh sách ngôn ngữ</div>';
            }
        };

        window.closeLanguagePicker = function() {
            document.getElementById('lang-picker-overlay').classList.add('hidden');
        };

        window.setSelectedLang = function(lang, name) {
            closeLanguagePicker();
            if (lang === selectedLanguage) return;
            
            const speakerBtn = document.getElementById('sheet-speaker-btn');
            if (speakerBtn && speakerBtn.classList.contains('playing')) {
                window.location.href = `app-request-confirm://lang-switch?lang=${lang}&name=${encodeURIComponent(name || '')}`;
                return;
            }

            selectedLanguage = lang;
            if (name) document.getElementById('current-lang-name').innerText = name;
            
            // Ensure local state is consistent before notifying C#
            currentPoiDescription = ""; // Wait for reload
            
            // Notify C# to update session language and stop current audio
            window.location.href = `app-request-reload://markers?lang=${lang}`;
            
            // Auto-play in new language if details are open
            if (currentPoiIdOpen) {
                if (speakerBtn) speakerBtn.classList.remove('playing'); 
                setTimeout(() => playCurrentTourPoiAudio(), 300);
            }
        };

        window.focusStop = function(index) {
            const m = markers.find(mark => mark.options.icon.options.html && mark.options.icon.options.html.includes(`>${index + 1}<`));
            if (m) {
                map.flyTo(m.getLatLng(), 17, { animate: true, duration: 1.5 });
            }
        };

        window.centerOnUser = function() {
            if (userMarker) {
                map.flyTo(userMarker.getLatLng(), 17, { animate: true, duration: 1 });
            } else {
                window.location.href = `app-ui://alert?message=${encodeURIComponent("Đang xác định vị trí của bạn...")}`;
            }
        };
    </script>
</body>
</html>
