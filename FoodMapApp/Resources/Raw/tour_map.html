<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tour Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        #map { height: 100vh; width: 100vw; background: #f8f9fa; }
        
        /* Custom Numbered Markers */
        .tour-marker {
            background: #333;
            color: white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            font-size: 14px;
        }
        .tour-marker.active {
            background: #FF6A88;
            transform: scale(1.2);
            z-index: 1000 !important;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([10.7672, 106.6931], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);

        let tourPois = [];
        let markers = [];
        let routeLayer = null;

        window.loadTourRoute = async function(json) {
            console.log("Loading tour route...");
            tourPois = typeof json === 'string' ? JSON.parse(json) : json;
            
            // Clear existing
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            if (routeLayer) map.removeLayer(routeLayer);

            if (tourPois.length === 0) return;

            const coords = [];
            tourPois.forEach((poi, index) => {
                const marker = L.marker([poi.latitude, poi.longitude], {
                    icon: L.divIcon({
                        className: 'tour-marker',
                        html: `<span>${index + 1}</span>`,
                        iconSize: [30, 30],
                        iconAnchor: [15, 15]
                    })
                }).addTo(map);
                markers.push(marker);
                coords.push(`${poi.longitude},${poi.latitude}`);
            });

            // Fetch OSRM Route
            const url = `https://router.project-osrm.org/route/v1/driving/${coords.join(';')}?overview=full&geometries=geojson`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                if (data.code === 'Ok') {
                    routeLayer = L.geoJSON(data.routes[0].geometry, {
                        style: { color: '#333', weight: 5, opacity: 0.7, lineJoin: 'round' }
                    }).addTo(map);
                    map.fitBounds(routeLayer.getBounds(), { padding: [80, 80] });
                }
            } catch (e) {
                console.error("OSRM Error:", e);
                // Fallback to simple line
                routeLayer = L.polyline(tourPois.map(p => [p.latitude, p.longitude]), { color: '#333', dashArray: '5, 10' }).addTo(map);
            }
        };

        window.focusStop = function(index) {
            markers.forEach((m, i) => {
                if (i === index) {
                    m.getElement().classList.add('active');
                    map.flyTo(m.getLatLng(), 17, { animate: true, duration: 1 });
                } else {
                    m.getElement().classList.remove('active');
                }
            });
        };
    </script>
</body>
</html>
