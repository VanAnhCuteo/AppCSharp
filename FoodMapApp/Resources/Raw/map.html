<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Food Map</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="base.css" />
    <link rel="stylesheet" href="markers.css" />
    <link rel="stylesheet" href="sheet.css" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Search Bar -->
    <div class="map-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="map-search-input" placeholder="Tìm kiếm quán ăn..." autocomplete="off">
        <button id="search-clear-btn" class="search-clear-btn hidden">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
        <!-- Search Results Dropdown -->
        <div id="search-results" class="search-results-dropdown hidden"></div>
    </div>

    <!-- Integrated Navigation Overlay -->
    <div id="nav-overlay" class="nav-overlay hidden">
        <div class="nav-content">
            <div class="nav-stats">
                <span id="nav-dist-val">0.0 km</span> • <span id="nav-time-val">0 phút</span>
            </div>
            <div class="nav-modes">
                <button id="mode-motor" class="mode-btn active" onclick="switchNavMode('driving')">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M21,11c0-1.66-1.34-3-3-3h-1.59l-1.7-2.27C14.4,5.32,13.9,5,13.37,5H9c-0.55,0-1,0.45-1,1v1H6c-1.66,0-3,1.34-3,3v2c0,1.66,1.34,3,3,3h0.18C6.59,16.16,7.7,17,9,17s2.41-0.84,2.82-2h2.36c0.41,1.16,1.52,2,2.82,2c1.66,0,3-1.34,3-3H21z M9,15c-0.55,0-1-0.45-1-1s0.45-1,1-1s1,0.45,1,1S9.55,15,9,15z M17,15c-0.55,0-1-0.45-1-1s0.45-1,1-1s1,0.45,1,1S17.55,15,17,15z M18,10c0.55,0,1,0.45,1,1h-4.59l1-1.33C15.65,10.15,16.32,10,17,10z"/>
                    </svg>
                </button>
                <button id="mode-walk" class="mode-btn" onclick="switchNavMode('walking')">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M13.5,5.5c0,1.1-0.9,2-2,2s-2-0.9-2-2s0.9-2,2-2S13.5,4.4,13.5,5.5z M14.1,13l1.8,4.7c0.2,0.5,0.7,0.8,1.2,0.8c0.8,0,1.4-0.8,1.1-1.6l-2-5.3c-0.3-0.8-1.1-1.3-1.9-1.3h-4.6L8,12.9L5.8,21.1c-0.1,0.5,0.1,1,0.5,1.3C6.7,12.7,7.2,12.6,7.6,12.2l1.9-2.3L11.5,11v7c0,0.6,0.4,1,1,1s1-0.4,1-1V13H14.1z"/>
                    </svg>
                </button>
            </div>
            <button class="nav-cancel-btn" onclick="cancelNavigation()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
    </div>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Center Button -->
    <button id="locate-btn" onclick="centerOnUser()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="3 11 22 2 13 21 11 13 3 11"></polygon>
        </svg>
    </button>

    <!-- Bottom Sheet Details -->
    <div id="bottom-sheet" class="bottom-sheet">
        <div class="sheet-drag-handle" id="drag-handle">
            <div class="drag-bar"></div>
        </div>
        <div class="sheet-content">
            <div id="sheet-header">
                <div style="flex: 1; min-width: 0;">
                    <h2 id="sheet-title">Tên quán</h2>
                    <div class="lang-selector-modern" onclick="openLanguagePicker()">
                        <div class="current-lang-btn">
                            <span id="current-lang-name">Tiếng Việt</span>
                            <svg class="chevron-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>
                    </div>
                </div>
                <button id="sheet-speaker-btn" class="speaker-btn hidden" onclick="toggleAudioProfessional()">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.03,19.86 21,16.28 21,12C21,7.72 18.03,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16.02C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z"/>
                    </svg>
                </button>
            </div>

            <!-- Image Gallery -->
            <div class="sheet-images" id="sheet-images"></div>


            <!-- Info Section -->
            <div class="sheet-info">
                <div class="info-row">
                    <svg class="info-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                    <span id="sheet-address"></span>
                </div>
                <div class="info-row">
                    <svg class="info-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span id="sheet-time"></span>
                </div>
                
                <button id="get-directions-btn" class="resto-btn" style="background: var(--pink-dark); width: 100%; margin-top: 15px; border-radius: 14px; height: 50px; color: white; border: none; font-weight: bold; font-size: 16px; box-shadow: 0 4px 15px rgba(255, 106, 136, 0.3);">
                    Chỉ đường đến quán
                </button>
            </div>
        </div>
    </div>

    <!-- Language Picker Overlay -->
    <div id="lang-picker-overlay" class="lang-picker-overlay hidden">
        <div class="lang-picker-container">
            <div class="lang-picker-header">
                <h3>Chọn ngôn ngữ</h3>
                <button onclick="closeLanguagePicker()">Xong</button>
            </div>
            <div id="lang-picker-list" class="lang-picker-list">
                <!-- Dynamic Content -->
            </div>
        </div>
    </div>

    <!-- JS Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="constants.js"></script>
    <script src="features.js"></script>
    <script src="script.js"></script>
</body>
</html>
