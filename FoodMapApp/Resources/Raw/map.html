<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Restaurant Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS Modules -->
    <link rel="stylesheet" href="base.css" />
    <link rel="stylesheet" href="markers.css" />
    <link rel="stylesheet" href="sheet.css" />

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

    <div class="map-header">
        <svg fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"></path></svg>
        <input type="text" id="map-search-input" placeholder="Tìm quán, địa chỉ..." autocomplete="off">
    </div>

    <div id="map"></div>

    <!-- Navigation Overlay (Google Maps Style) -->
    <div id="nav-overlay" class="nav-overlay hidden">
        <div class="nav-info">
            <span id="nav-distance">0.0 km</span>
        </div>
        <button class="nav-cancel-btn" onclick="cancelNavigation()">Hủy chỉ dẫn</button>
    </div>

    <button id="locate-btn" onclick="centerOnUser()" title="My Location">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
            <circle cx="12" cy="10" r="3"></circle>
        </svg>
    </button>

    <!-- Bottom Sheet -->
    <div id="bottom-sheet" class="bottom-sheet hidden">
        <div class="sheet-drag-handle" id="drag-handle">
            <div class="drag-bar"></div>
        </div>
        <div class="sheet-content">
            <div id="sheet-header">
                <div style="flex: 1;">
                    <h2 id="sheet-title">Loading...</h2>
                    <div class="lang-selector">
                        <div class="lang-btn active" onclick="setSelectedLang('vi', this)">
                            <img src="images/vn_flag.png" alt="VI">
                        </div>
                        <div class="lang-btn" onclick="setSelectedLang('en-US', this)">
                            <img src="images/uk_flag.png" alt="EN">
                        </div>
                        <div class="lang-btn" onclick="setSelectedLang('zh-CN', this)">
                            <img src="images/cn_flag.png" alt="CN">
                        </div>
                    </div>
                </div>
                <div class="sheet-meta">
                    <span id="sheet-visitors">0 visits</span>
                </div>
            </div>

            <!-- Images Carousel -->
            <div class="sheet-images" id="sheet-images">
                <!-- Generated dynamically -->
            </div>

            <!-- Details -->
            <div class="sheet-info">
                <div class="info-row">
                    <svg class="info-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span id="sheet-address"></span>
                </div>
                <div class="info-row">
                    <svg class="info-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span id="sheet-time"></span>
                </div>

                <!-- Compact Premium Audio Player -->
                <div id="sheet-audio-section" class="audio-card hidden">
                    <div class="audio-card-body">
                        <button class="audio-play-btn" onclick="toggleAudioProfessional()" id="main-audio-toggle">
                            <svg id="main-play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                            <svg id="main-pause-icon" class="hidden" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        </button>
                        
                        <div class="audio-card-center">
                            <div class="audio-status-row">
                                <span id="audio-status-text">Bản dịch Audio</span>
                                <span id="mini-player-timer">00:00</span>
                            </div>
                            <div class="audio-progress-container">
                                <div class="audio-progress-track">
                                    <div id="audio-progress-fill" class="audio-progress-fill"></div>
                                </div>
                            </div>
                        </div>

                        <button class="audio-replay-btn" onclick="restartAudio()" title="Nghe lại">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
                        </button>
                    </div>
                </div>
                <!-- Navigation Button -->
                <button id="get-directions-btn" class="resto-btn" style="background: var(--pink-dark); width: 100%; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; border-radius: 14px; height: 50px;">
                    <svg fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" style="width: 20px; height: 20px;"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"></path></svg>
                    Đến quán
                </button>
            </div>

            <!-- Reviews Section -->
            <div class="sheet-reviews-section">
                <h3>Reviews</h3>
                <div id="sheet-reviews-list"></div>

                <div class="review-form">
                    <textarea id="review-comment" class="review-input" placeholder="Chia sẻ cảm nhận của bạn..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="text"></textarea>
                    <button id="submit-review-btn" class="resto-btn">Submit Review</button>
                </div>
            </div>
            <!-- Integrated Audio Status Bar -->
            <div id="audio-status-bar" class="audio-status-bar hidden">
                <div class="mini-player-visual">
                    <div class="mini-bar"></div>
                    <div class="mini-bar"></div>
                    <div class="mini-bar"></div>
                </div>
                <span id="mini-player-timer">00:00</span>
                <div class="audio-progress-track">
                    <div id="audio-progress-fill" class="audio-progress-fill"></div>
                </div>
                <button class="mini-stop-btn" onclick="stopAudioProfessional()">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h12v12H6z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Custom JS Modules -->
    <script src="constants.js"></script>
    <script src="features.js"></script>
    <script src="script.js"></script>
</body>
</html>
