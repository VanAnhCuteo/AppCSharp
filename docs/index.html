<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodMap - Tải ứng dụng</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #fff;
            overflow: hidden;
        }

        /* Animated background particles */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            animation: float 15s infinite ease-in-out;
        }

        .particle:nth-child(1) { width: 300px; height: 300px; top: -150px; left: -100px; animation-delay: 0s; }
        .particle:nth-child(2) { width: 200px; height: 200px; bottom: -100px; right: -50px; animation-delay: 3s; }
        .particle:nth-child(3) { width: 150px; height: 150px; top: 50%; left: 50%; animation-delay: 6s; }
        .particle:nth-child(4) { width: 250px; height: 250px; top: 20%; right: -80px; animation-delay: 9s; background: rgba(99, 102, 241, 0.08); }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(15px, 15px) scale(1.02); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 440px;
            width: 100%;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 3rem 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #a78bfa);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4); }
            50% { box-shadow: 0 4px 40px rgba(99, 102, 241, 0.6); }
        }

        .logo-container svg {
            width: 56px;
            height: 56px;
            fill: #fff;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, #c4b5fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        /* Spinner */
        .spinner-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            min-height: 40px;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-text {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.3s ease;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 1rem 1.5rem;
            border: none;
            border-radius: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 0.75rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: #fff;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(99, 102, 241, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.14);
            transform: translateY(-2px);
        }

        .btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .buttons-group {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .buttons-group.show {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 0.5rem 0;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .divider span {
            padding: 0 0.75rem;
        }

        .footer-text {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.35);
        }
    </style>
</head>
<body>
    <!-- Background particles -->
    <div class="bg-particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="container">
        <div class="card">
            <!-- Logo -->
            <div class="logo-container">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                </svg>
            </div>

            <h1>FoodMap</h1>
            <p class="subtitle">Khám phá ẩm thực xung quanh bạn với hướng dẫn audio thông minh</p>

            <!-- Loading state -->
            <div class="spinner-container" id="spinnerContainer">
                <div class="spinner"></div>
                <span class="status-text" id="statusText">Đang mở ứng dụng...</span>
            </div>

            <!-- Buttons (shown after timeout) -->
            <div class="buttons-group" id="buttonsGroup">
                <a href="foodmap://guest" class="btn btn-primary" id="btnOpenApp">
                    <svg viewBox="0 0 24 24"><path d="M17 1.01L7 1C5.9 1 5 1.9 5 3v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/></svg>
                    Mở ứng dụng FoodMap
                </a>

                <div class="divider"><span>hoặc</span></div>

                <a href="https://drive.google.com/drive/folders/1bU7chLntwcF-s5efqXD1WF1FvltABK05?usp=sharing" class="btn btn-secondary" id="btnDownload">
                    <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                    Tải APK từ Google Drive
                </a>
            </div>

            <p class="footer-text">© 2026 FoodMap Team</p>
        </div>
    </div>

    <script>
        const DEEP_LINK = 'foodmap://guest';
        const DRIVE_LINK = 'https://drive.google.com/drive/folders/1bU7chLntwcF-s5efqXD1WF1FvltABK05?usp=sharing';
        const TIMEOUT_MS = 2500; // Wait 2.5 seconds before showing fallback

        const spinnerContainer = document.getElementById('spinnerContainer');
        const statusText = document.getElementById('statusText');
        const buttonsGroup = document.getElementById('buttonsGroup');

        let appOpened = false;

        // Detect if user leaves page (app opened successfully)
        function onPageHidden() {
            appOpened = true;
        }
        document.addEventListener('visibilitychange', function () {
            if (document.hidden) onPageHidden();
        });
        window.addEventListener('blur', onPageHidden);

        // Try to open the app via deep link
        function tryOpenApp() {
            // Use an iframe approach for better compatibility
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = DEEP_LINK;
            document.body.appendChild(iframe);

            // Also try direct navigation as fallback
            setTimeout(function () {
                if (!appOpened) {
                    window.location.href = DEEP_LINK;
                }
            }, 300);

            // After timeout, show download options if app didn't open
            setTimeout(function () {
                if (!appOpened) {
                    statusText.textContent = 'Không tìm thấy ứng dụng. Bạn có thể tải về bên dưới.';
                    spinnerContainer.querySelector('.spinner').style.display = 'none';
                    buttonsGroup.classList.add('show');

                    // Auto-redirect to Drive after showing buttons
                    setTimeout(function () {
                        if (!appOpened) {
                            window.location.href = DRIVE_LINK;
                        }
                    }, 3000);
                }

                // Clean up iframe
                if (iframe.parentNode) {
                    iframe.parentNode.removeChild(iframe);
                }
            }, TIMEOUT_MS);
        }

        // Start on page load
        tryOpenApp();
    </script>
</body>
</html>
